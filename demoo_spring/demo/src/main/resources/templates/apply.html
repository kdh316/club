<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>가입 신청</title>

    <style>

        body {
            text-align: center;
            font-family: "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
            background-color: white;
        }

        .container {
            width: 900px;
            margin: 170px auto;
        }

        h1 {
            font-size: 54px;
            margin-bottom: 70px;
        }

        form {
            font-size: 26px;
        }

        input {
            width: 320px;
            height: 45px;
            font-size: 22px;
            margin: 18px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            padding-left: 10px;
        }

        button {
            margin-top: 45px;
            width: 220px;
            height: 60px;
            font-size: 24px;
            border: 1px solid #cccccc;
            border-radius: 10px;
            background-color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #f3f3f3;
        }

        .back {
            margin-top: 55px;
        }

        .back a {
            font-size: 22px;
            text-decoration: none;
            color: black;
        }

    </style>
</head>

<body>

<div class="container">

    <h1 th:text="${clubName + ' 가입 신청'}"></h1>

    <form action="/club/apply" method="post">

        <input type="hidden" name="clubName" th:value="${clubName}">

        <p>
            학번
            <input type="text" name="studentId" required>
        </p>

        <p>
            이름
            <input type="text" name="name" required>
        </p>

        <button type="submit">
            가입 신청
        </button>

    </form>

    <div class="back">
        <a th:href="@{/club(clubName=${clubName})}">
            ← 뒤로가기
        </a>
    </div>

</div>

</body>
</html>
