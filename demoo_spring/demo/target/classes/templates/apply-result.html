<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>가입 신청 결과</title>

    <style>
        body {
            font-family: "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
            text-align: center;
            background-color: white;
        }

        .container {
            width: 900px;
            margin: 180px auto;
        }

        h1 {
            font-size: 54px;
            margin-bottom: 80px;
        }

        .result-box {
            width: 650px;
            margin: 0 auto;
            padding: 70px 50px;

            border: 1px solid #cccccc;
            border-radius: 14px;
        }

        .success {
            font-size: 34px;
            margin-bottom: 30px;
        }

        .fail {
            font-size: 34px;
            margin-bottom: 30px;
            color: red;
        }

        .sub-text {
            font-size: 24px;
            color: #555555;
        }

        .back {
            margin-top: 70px;
        }

        .back a {
            display: inline-block;

            width: 280px;
            padding: 20px 0;

            border: 1px solid #cccccc;
            border-radius: 12px;

            text-decoration: none;
            color: black;
            font-size: 22px;
        }

        .back a:hover {
            background-color: #f3f3f3;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>가입 신청 결과</h1>

    <div class="result-box">

        <div th:if="${result}">
            <div class="success">
                가입 신청이 완료되었습니다!
            </div>

            <div class="sub-text">
                동아리 승인을 기다려주세요.
            </div>
        </div>

        <div th:unless="${result}">
            <div class="fail">
                이미 가입했거나 신청한 학번입니다.
            </div>
        </div>

    </div>

    <div class="back">
        <a th:href="@{/club(clubName=${clubName})}">
            ← 동아리 메뉴로 돌아가기
        </a>
    </div>

</div>

</body>
</html>
